################################################################################
# Privacy Module
# StashConfig v1.0
################################################################################

################################################################################
# TUN
################################################################################

tun:

  enable: true

  stack: system

  auto-route: true

  auto-detect-interface: true

  strict-route: true

  dns-hijack:

    - any:53

################################################################################
# Sniffer
################################################################################

sniffer:

  enable: true

  sniff:

    HTTP:

      ports:

        - 80

        - 8080-8880

    TLS:

      ports:

        - 443

        - 8443

    QUIC:

      ports:

        - 443

  force-domain:

    - +.google.com
    - +.googleapis.com
    - +.youtube.com
    - +.ytimg.com
    - +.github.com
    - +.githubusercontent.com
    - +.openai.com
    - +.chatgpt.com
    - +.oaistatic.com
    - +.claude.ai

  skip-domain:

    - Mijia Cloud
    - dlg.io.mi.com
    - +.push.apple.com
    - +.icloud.com
    - +.local
    - +.lan

################################################################################
# Hosts
################################################################################

hosts:

  localhost: 127.0.0.1

################################################################################
# Experimental
################################################################################

experimental:

  ignore-resolve-fail: true
