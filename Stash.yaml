  - name: 🛒 Shopping
    type: select
    proxies:
      - DIRECT
      - ♻️ 自动选择
      - 🇺🇸 美国节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点
      - 🚀 节点选择

  - name: 🎥 Emby
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🇺🇸 美国节点
      - 🇸🇬 新加坡节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点

  - name: ⏬ PT
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择

  - name: 🚀 测速
